# Codex CLI configuration.
# MCP servers, hooks, and agents in this file are generated by
# scripts/render-codex-config.sh from shared/mcp/servers.json and other
# canonical sources. Hand-written settings (model, sandbox, tui) belong
# in the [user] sections below and are preserved by the render script.

[features]
memories = true

[tui]
theme = "tokyonight"

[projects."/home/junho"]
trust_level = "trusted"

[mcp_servers]

[mcp_servers.linear]
url = "https://mcp.linear.app/mcp"
